<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coffee Code II</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="contenedor">

        <h1>
            Coffee Code II
        </h1>

        <!-- FILTROS -->

        <div class="filtros">

            <button onclick="mostrarTodos()">

                Todos

            </button>

            <button onclick="filtrarBebidas()">

                Bebidas

            </button>

            <button onclick="filtrarPostres()">

                Postres

            </button>

            <button onclick="filtrarBaratos()">

                Baratos

            </button>

            <button onclick="filtrarCaros()">

                Premium

            </button>

        </div>

        <!-- PROMOCIONES -->

        <h2 class="titulo-promociones">

            Promociones

        </h2>

        <div id="promociones" class="productos"></div>

        <!-- PRODUCTOS -->

        <h2 class="titulo-promociones">

            Productos

        </h2>

        <div id="productos" class="productos"></div>

        <!-- TICKET -->

        <div class="ticket">

            <h2>
                Pedido
            </h2>

            <ul id="listaPedido"></ul>

            <p>

                Subtotal: $

                <span id="subtotal">

                    0

                </span>

            </p>

            <p>

                IVA: $

                <span id="iva">

                    0

                </span>

            </p>

            <p>

                Total: $

                <span id="total">

                    0

                </span>

            </p>

        </div>

    </div>

    <!-- SCRIPTS -->

    <script src="js/datos.js"></script>

    <script src="js/cocina.js"></script>

    <script src="js/caja.js"></script>

    <script src="js/cliente.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
